<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<title>InvestAI — Dashboard</title>
<link rel="icon" href="investai-ds/logo/favicon.ico" sizes="any">
<link rel="icon" type="image/svg+xml" href="investai-ds/logo/investai-icon.svg">
<link rel="apple-touch-icon" href="investai-ds/logo/icon-180.png">
<link rel="stylesheet" href="investai-ds/investai.css">
<style>
  /* Dashboard-specific, all token-driven (extends the InvestAI design system in its spirit). */
  *{box-sizing:border-box} body{margin:0}
  .appbar{display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid var(--border);
    background:var(--surface-card);position:sticky;top:0;z-index:5}
  .appbar .brand{display:inline-flex;align-items:center;text-decoration:none}
  .appbar .brand img{height:24px;width:auto;display:block}
  .appbar .sp{flex:1}
  .appbar .who{font-family:var(--font-mono);font-size:var(--fs-xs);color:var(--text-muted)}
  main{padding:24px 20px;max-width:var(--container);margin:0 auto}
  .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
  .tabs button{font-family:var(--font-body);font-weight:600;font-size:var(--fs-sm);cursor:pointer;
    padding:.5rem 1rem;border-radius:var(--r-pill);border:1px solid var(--border-strong);
    background:var(--surface-card);color:var(--text-muted);transition:all var(--dur) var(--ease-out)}
  .tabs button:hover{border-color:var(--c-blue);color:var(--c-blue)}
  .tabs button.on{background:var(--primary);color:var(--primary-ink);border-color:var(--primary);box-shadow:var(--shadow-sm)}
  .card{background:var(--surface-card);border:1px solid var(--border);border-radius:var(--r-lg);
    box-shadow:var(--shadow-md);padding:18px 20px;margin-bottom:16px}
  .card h2{font-family:var(--font-mono);text-transform:uppercase;letter-spacing:var(--tracking-eyebrow);
    font-size:var(--fs-eyebrow);color:var(--c-blue);margin:0 0 14px;display:inline-flex;align-items:center;gap:8px}
  .card h2::before{content:"";width:28px;height:2px;border-radius:2px;background:var(--grad-spectrum)}
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .filters select{font-family:var(--font-body);font-size:var(--fs-sm);color:var(--text-strong);
    background:var(--surface-card);border:1px solid var(--border-strong);border-radius:var(--r-pill);
    padding:.4rem .9rem;cursor:pointer}
  .filters select:focus{outline:none;border-color:var(--c-blue);box-shadow:0 0 0 3px rgba(71,123,209,.18)}
  table{width:100%;border-collapse:collapse;font-size:var(--fs-sm)}
  th{text-align:left;font-family:var(--font-mono);color:var(--text-subtle);font-size:var(--fs-eyebrow);
    text-transform:uppercase;letter-spacing:.08em;padding:8px;border-bottom:1px solid var(--border)}
  td{padding:9px 8px;border-bottom:1px solid var(--border);color:var(--text);font-variant-numeric:tabular-nums}
  th[data-k]{cursor:pointer;user-select:none} th[data-k]:hover{color:var(--text-strong)}
  .mono{font-family:var(--font-mono);color:var(--text-strong)}
  .muted{color:var(--text-muted)}
  .iv-badge-danger{background:rgba(226,82,71,.14);color:var(--danger)}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px}
  .kpi{background:var(--surface-card);border:1px solid var(--border);border-radius:var(--r-lg);
    box-shadow:var(--shadow-sm);padding:14px 16px}
  .kpi .v{font-family:var(--font-display);font-weight:600;font-size:var(--fs-2xl);color:var(--text-strong);
    font-variant-numeric:tabular-nums;letter-spacing:var(--tracking-display)}
  .kpi .l{font-family:var(--font-mono);font-size:var(--fs-eyebrow);color:var(--text-subtle);
    text-transform:uppercase;letter-spacing:.12em}
  .empty{color:var(--text-muted);padding:18px 4px}
  .legend{margin-top:14px;padding-top:12px;border-top:1px solid var(--border);
    font-family:var(--font-mono);font-size:var(--fs-eyebrow);color:var(--text-subtle);line-height:1.7}
  .login{max-width:380px;margin:13vh auto;text-align:center;padding:0 20px}
  .login .mark{height:60px;width:auto;margin-bottom:10px}
  .login h1{font-family:var(--font-display);font-weight:600;letter-spacing:var(--tracking-display);
    color:var(--text-strong);font-size:var(--fs-3xl);margin:0 0 4px}
  .foot{color:var(--text-subtle);font-size:var(--fs-xs);margin-top:24px}
  .err{color:var(--danger);font-size:var(--fs-sm)}
  .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  @media (max-width:640px){
    .appbar{padding:12px 14px} .appbar .who{display:none}
    main{padding:16px 12px}
    .tabs button{flex:1 1 auto}
    .filters select{flex:1 1 auto}
    .kpis{grid-template-columns:repeat(2,1fr)}
    table,thead,tbody,tr,td{display:block;width:100%}
    thead{display:none}
    tr{border:1px solid var(--border);border-radius:var(--r-md);margin-bottom:10px;padding:4px 12px;background:var(--surface-card)}
    td{border:0;padding:7px 0;display:flex;justify-content:space-between;align-items:baseline;gap:12px;text-align:right}
    td::before{content:attr(data-label);font-family:var(--font-mono);color:var(--text-subtle);font-size:var(--fs-eyebrow);
      text-transform:uppercase;letter-spacing:.06em;text-align:left;flex:0 0 38%}
    td:first-child{font-weight:700;border-bottom:1px solid var(--border);margin-bottom:2px;padding-top:8px}
  }
</style>
</head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* Public, by design: URL + anon key are safe in client code — security is Supabase Auth + RLS. */
const SUPABASE_URL = "https://akevbpevovkjziddzxch.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFrZXZicGV2b3ZranppZGR6eGNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0OTExMDcsImV4cCI6MjA5ODA2NzEwN30.PI5vACZNajlv0llm1ODnyWmpJlaZwwhg1KbAQu5b4sU";
const DISCLAIMER = "Research, not financial advice. Evidence-based; unsourced items excluded.";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const app = document.getElementById("app");
const esc = s => String(s ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));
const CALL_BADGE = { buy:"iv-badge-success", add:"iv-badge-success", sell:"iv-badge-danger", trim:"iv-badge-danger", hold:"" };
const callPill = c => `<span class="iv-badge ${CALL_BADGE[c] || ""}">${esc(c)}</span>`;

/* plain-English helpers */
const fmtNum = x => (x == null || x === "") ? "—" : (Math.abs(x) >= 1e9 ? (x/1e9).toFixed(1)+"B" : Math.abs(x) >= 1e6 ? (x/1e6).toFixed(1)+"M" : (+x).toLocaleString(undefined,{maximumFractionDigits:2}));
const pctSigned = x => x == null ? "—" : (x >= 0 ? "+" : "") + (x*100).toFixed(1) + "%";
const tickerCell = r => `<span class="mono" style="font-weight:700">${esc(r.ticker)}</span>${r.name ? `<span class="muted" style="margin-left:6px">${esc(r.name)}</span>` : ""}`;
const priceCell = r => r.price == null ? '<span class="muted">—</span>' : esc(fmtNum(r.price));
const trendCell = r => r.ret_6mo == null ? '<span class="muted">—</span>' : `<span class="iv-delta ${r.ret_6mo >= 0 ? "up" : "down"}">${Math.abs(r.ret_6mo*100).toFixed(1)}%</span>`;
const SIG_LABEL = { pe:"P/E", ev_ebitda:"EV/EBITDA", ps:"P/S", revenue_growth:"Rev growth", fcf:"Free cash flow",
  gross_margin:"Gross margin", operating_margin:"Op margin", roe:"ROE", net_debt_ebitda:"Net debt/EBITDA",
  current_ratio:"Current ratio", dma50:"vs 50-day", dma200:"vs 200-day", ret_6mo:"6-mo return", sector:"Sector", market_cap:"Market cap" };
const PCT_SIG = new Set(["revenue_growth","gross_margin","operating_margin","roe","ret_6mo"]);
function fmtSig(s) {
  const lbl = SIG_LABEL[s.metric] || s.metric;
  if (s.value == null) return lbl;
  if (PCT_SIG.has(s.metric)) return `${lbl} ${(s.value*100).toFixed(0)}%`;
  if (s.metric === "fcf" || s.metric === "market_cap") return `${lbl} $${fmtNum(s.value)}`;
  if (typeof s.value === "number") return `${lbl} ${(+s.value).toLocaleString(undefined,{maximumFractionDigits:2})}`;
  return `${lbl} ${s.value}`;
}
const LEGEND = {
  portfolio: "Call — Buy/Add: consider buying · Trim/Sell: consider reducing or exiting · Hold: no change. Conf: how much data backed the view. ▲/▼: 6-month price trend.",
  opportunities: "Score 0–100: fit to your rules (65+ = buy bar). Signals — P/E, EV/EBITDA, P/S: valuation (lower = cheaper); Rev growth, margins, ROE: quality; 6-mo return: momentum. ▲/▼: 6-month trend.",
  forecasts: "Return: the call's price move since it was made. Bench: the benchmark's move. Alpha: Return − Bench (how much better/worse than the market). Hit = right, Miss = wrong.",
  shortseller: "Verdict — clean: no red flags found · watch: caution · red-flag: serious concern. Evidence-based; runs weekly.",
  speculative: "HIGH RISK: can lose the whole position. Conviction is low/medium only. Max %: suggested cap of your portfolio. Each idea carries a concrete, sourced catalyst. 52-wk: change over the last year.",
};

let state = { tab: "portfolio", v: {}, cache: {} };   // v[tab] = {f:{filterKey:val}, sort:{k,dir}}

async function boot() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) return renderLogin();
  renderShell(session);
}

function renderLogin(msg) {
  app.innerHTML = `<div class="login">
    <img class="mark" src="investai-ds/logo/investai-mark.svg" alt="InvestAI">
    <h1>InvestAI</h1>
    <p class="iv-muted">Sign in with GitHub to view your dashboard.</p>
    <button id="gh" class="iv-btn iv-btn-aurora" style="width:100%;margin-top:8px">Continue with GitHub</button>
    <div id="msg" class="muted" style="margin-top:12px">${msg || ""}</div>
  </div>`;
  document.getElementById("gh").onclick = async () => {
    const { error } = await sb.auth.signInWithOAuth({ provider: "github",
      options: { redirectTo: location.href.split("#")[0] } });
    if (error) document.getElementById("msg").innerHTML = `<span class="err">${esc(error.message)}</span>`;
  };
}

function renderShell(session) {
  app.innerHTML = `
    <header class="appbar">
      <a class="brand" href="."><img src="investai-ds/logo/investai-wordmark.svg" alt="InvestAI"></a>
      <span class="sp"></span>
      <span class="who">${esc(session.user.email)}</span>
      <button class="iv-btn iv-btn-secondary iv-btn-sm" id="logout">Sign out</button>
    </header>
    <main>
      <div class="tabs">
        ${["portfolio","opportunities","forecasts","shortseller","speculative"].map(t =>
          `<button data-tab="${t}" class="${state.tab===t?'on':''}">${t[0].toUpperCase()+t.slice(1)}</button>`).join("")}
      </div>
      <div id="view"></div>
      <div class="foot">${DISCLAIMER}</div>
    </main>`;
  document.getElementById("logout").onclick = async () => { await sb.auth.signOut(); renderLogin(); };
  document.querySelectorAll("[data-tab]").forEach(b => b.onclick = () => { state.tab = b.dataset.tab; renderShell(session); });
  renderTab();
}

/* ---------- view + generic filter/sort table layer ---------- */
const view = () => document.getElementById("view");
const empty = m => `<div class="card"><div class="empty">${m}</div></div>`;
const RENDER = { portfolio: renderPortfolio, opportunities: renderOpportunities,
                 forecasts: renderForecasts, shortseller: renderShortseller, speculative: renderSpeculative };
const rerender = () => RENDER[state.tab]();

async function renderTab() {
  view().innerHTML = `<div class="card"><div class="empty">Loading…</div></div>`;
  try { await RENDER[state.tab](); }
  catch (e) { view().innerHTML = empty(`Error: ${esc(e.message)}`); }
}

async function load(tab, fetcher) {            // fetch once per session, then filter/sort client-side
  if (!state.cache[tab]) state.cache[tab] = await fetcher();
  return state.cache[tab];
}
function vstate(tab, dflt) { return (state.v[tab] ||= { f: {}, sort: dflt || null }); }
function colGet(cols, k, r) { const c = cols.find(c => c.k === k); return c && c.get ? c.get(r) : r[k]; }

function applyView(rows, st, cols) {
  let out = rows.filter(r => Object.entries(st.f).every(([k, val]) =>
    !val || String(colGet(cols, k, r) ?? "") === val));
  if (st.sort) {
    const { k, dir } = st.sort;
    out = out.slice().sort((a, b) => {
      const x = colGet(cols, k, a), y = colGet(cols, k, b);
      if (typeof x === "number" && typeof y === "number") return dir * (x - y);
      return dir * String(x ?? "").localeCompare(String(y ?? ""));
    });
  }
  return out;
}

function filterBar(tab, rows, filters, cols) {
  if (!filters.length) return "";
  const st = vstate(tab);
  return `<div class="filters">${filters.map(f => {
    const vals = [...new Set(rows.map(r => colGet(cols, f.k, r)).filter(v => v != null && v !== ""))].sort();
    const opts = [`<option value="">All ${esc(f.label)}</option>`].concat(
      vals.map(v => `<option value="${esc(v)}" ${st.f[f.k]===String(v)?"selected":""}>${esc(v)}</option>`));
    return `<select class="flt" data-k="${esc(f.k)}">${opts.join("")}</select>`;
  }).join("")}</div>`;
}

function dataTable(tab, { title, rows, columns, filters = [], defaultSort = null, prefix = "", legend = "", empty: emptyMsg }) {
  const st = vstate(tab, defaultSort);
  const shown = applyView(rows, st, columns);
  const head = columns.map(c => c.sortable
    ? `<th data-k="${esc(c.k)}">${esc(c.label)}${st.sort && st.sort.k===c.k ? (st.sort.dir<0?" ▼":" ▲") : ""}</th>`
    : `<th>${esc(c.label)}</th>`).join("");
  const body = shown.map(r => "<tr>" + columns.map(c =>
    `<td class="${c.cls||""}" data-label="${esc(c.label)}">${c.render ? c.render(r) : esc(r[c.k] ?? "—")}</td>`
  ).join("") + "</tr>").join("");
  const inner = !rows.length
    ? `<div class="empty">${esc(emptyMsg || "No data yet.")}</div>`
    : `${filterBar(tab, rows, filters, columns)}<div class="table-wrap"><table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div>${shown.length ? "" : '<div class="empty">No rows match the filter.</div>'}`;
  view().innerHTML = `${prefix}<div class="card"><h2>${esc(title)}</h2>${inner}${legend && rows.length ? `<div class="legend">${legend}</div>` : ""}</div>`;
  view().querySelectorAll("select.flt").forEach(s => s.onchange = () => { st.f[s.dataset.k] = s.value; rerender(); });
  view().querySelectorAll("th[data-k]").forEach(th => th.onclick = () => {
    const k = th.dataset.k; st.sort = { k, dir: st.sort && st.sort.k===k ? -st.sort.dir : -1 }; rerender();
  });
}

/* ---------- tabs ---------- */
async function renderPortfolio() {
  const rows = await load("portfolio", async () => {
    const { data, error } = await sb.from("recommendations").select("*").eq("kind", "holding").order("date", { ascending: false });
    if (error) throw error; return dedupeByTicker(data || []);
  });
  dataTable("portfolio", {
    title: "Portfolio — latest calls", rows, empty: "No portfolio calls yet — first pipeline run pending.",
    columns: [
      { k: "ticker", label: "Ticker", sortable: true, render: tickerCell },
      { k: "call", label: "Call", sortable: true, render: r => callPill(r.call) },
      { k: "price", label: "Price", sortable: true, get: r => r.price ?? -1, render: priceCell },
      { k: "ret_6mo", label: "6-mo", sortable: true, get: r => r.ret_6mo ?? -999, render: trendCell },
      { k: "rationale", label: "Why", render: r => esc(r.rationale ?? "—") },
      { k: "confidence_pct", label: "Conf", sortable: true, get: r => r.confidence_pct ?? -1, render: r => (r.confidence_pct ?? "—") + "%" },
      { k: "date", label: "Date", cls: "muted", sortable: true },
    ],
    filters: [{ k: "call", label: "Call" }], defaultSort: { k: "date", dir: -1 }, legend: LEGEND.portfolio,
  });
}

async function renderOpportunities() {
  const rows = await load("opportunities", async () => {
    const { data, error } = await sb.from("scores").select("*").order("date", { ascending: false });
    if (error) throw error; return dedupeByTicker(data || []);
  });
  dataTable("opportunities", {
    title: "Opportunities — latest scores", rows, empty: "No scores yet — first pipeline run pending.",
    columns: [
      { k: "ticker", label: "Ticker", sortable: true, render: tickerCell },
      { k: "score", label: "Score", sortable: true, get: r => r.score ?? -1, render: r => `<b>${r.score ?? "n/a"}</b>` },
      { k: "price", label: "Price", sortable: true, get: r => r.price ?? -1, render: priceCell },
      { k: "ret_6mo", label: "6-mo", sortable: true, get: r => r.ret_6mo ?? -999, render: trendCell },
      { k: "date", label: "Date", cls: "muted", sortable: true },
      { k: "signals", label: "Top signals", cls: "muted", render: r => (r.signals || []).slice(0, 4).map(s => esc(fmtSig(s))).join(" · ") },
    ],
    defaultSort: { k: "score", dir: -1 }, legend: LEGEND.opportunities,
  });
}

async function renderForecasts() {
  const [outs, fcs] = await load("forecasts", async () => {
    const [a, b] = await Promise.all([sb.from("forecast_outcomes").select("*"), sb.from("forecasts").select("*")]);
    if (a.error) throw a.error; if (b.error) throw b.error; return [a.data || [], b.data || []];
  });
  const n = outs.length, hits = outs.filter(o => o.outcome === "hit").length;
  const avgAlpha = n ? outs.reduce((s, o) => s + (o.alpha_pct || 0), 0) / n : null;
  const open = fcs.filter(f => f.status === "open").length;
  const kpis = `<div class="kpis" style="margin-bottom:16px">
      <div class="kpi"><div class="l">Graded</div><div class="v">${n}</div></div>
      <div class="kpi"><div class="l">Hit-rate</div><div class="v">${n ? Math.round(hits / n * 100) + "%" : "—"}</div></div>
      <div class="kpi"><div class="l">Avg alpha</div><div class="v">${avgAlpha == null ? "—" : (avgAlpha * 100).toFixed(1) + "%"}</div></div>
      <div class="kpi"><div class="l">Open</div><div class="v">${open}</div></div>
    </div>`;
  dataTable("forecasts", {
    prefix: kpis, title: "Forecast ledger — graded", rows: outs,
    empty: "No forecasts graded yet — they grade once their horizon elapses.",
    columns: [
      { k: "forecast_id", label: "Forecast", cls: "mono" },
      { k: "outcome", label: "Outcome", sortable: true, render: r => callPill(r.outcome === "hit" ? "add" : r.outcome === "miss" ? "sell" : "hold") + esc(r.outcome) },
      { k: "return_pct", label: "Return", sortable: true, get: r => r.return_pct ?? -999, render: r => pct(r.return_pct) },
      { k: "benchmark", label: "Bench", cls: "muted", render: r => esc(r.benchmark) + " " + pct(r.benchmark_return_pct) },
      { k: "alpha_pct", label: "Alpha", sortable: true, get: r => r.alpha_pct ?? -999, render: r => `<b>${pct(r.alpha_pct)}</b>` },
      { k: "eval_date", label: "Eval", cls: "muted", sortable: true },
    ],
    filters: [{ k: "outcome", label: "Outcome" }], defaultSort: { k: "eval_date", dir: -1 }, legend: LEGEND.forecasts,
  });
}

async function renderShortseller() {
  const rows = await load("shortseller", async () => {
    const { data, error } = await sb.from("shortseller_reports").select("*").order("date", { ascending: false });
    if (error) throw error; return data || [];
  });
  dataTable("shortseller", {
    title: "Short-seller checks", rows, empty: "No short-seller reports yet.",
    columns: [
      { k: "ticker", label: "Ticker", cls: "mono", sortable: true },
      { k: "verdict", label: "Verdict", sortable: true },
      { k: "date", label: "Date", cls: "muted", sortable: true },
    ],
    filters: [{ k: "verdict", label: "Verdict" }], defaultSort: { k: "date", dir: -1 }, legend: LEGEND.shortseller,
  });
}

async function renderSpeculative() {
  const rows = await load("speculative", async () => {
    const { data, error } = await sb.from("spec_candidates").select("*").order("date", { ascending: false });
    if (error) throw error; return dedupeByTicker(data || []);
  });
  if (!rows.length) return view().innerHTML = empty("No speculative ideas yet — weekly only, and only when a sourced catalyst is found.");
  const st = vstate("speculative", { k: "date", dir: -1 });
  const convs = [...new Set(rows.map(r => r.conviction).filter(Boolean))].sort();
  let shown = rows.filter(r => !st.f.conviction || r.conviction === st.f.conviction);
  shown = shown.slice().sort((a, b) => st.sort.k === "chg_52w"
    ? st.sort.dir * ((a.chg_52w ?? 0) - (b.chg_52w ?? 0))
    : st.sort.dir * String(a[st.sort.k] ?? "").localeCompare(String(b[st.sort.k] ?? "")));
  const bar = `<div class="filters">
    <select class="sflt"><option value="">All conviction</option>${convs.map(c => `<option ${st.f.conviction === c ? "selected" : ""}>${esc(c)}</option>`).join("")}</select>
    <select class="ssort"><option value="date" ${st.sort.k === "date" ? "selected" : ""}>Newest first</option><option value="chg_52w" ${st.sort.k === "chg_52w" ? "selected" : ""}>Most beaten-down</option></select>
  </div>`;
  const cards = shown.length ? shown.map(r => {
    const cat = (r.catalyst && r.catalyst.claim) ? r.catalyst.claim : "";
    return `<div class="card" style="margin:10px 0">
      <div>${tickerCell(r)}
        <span class="iv-badge iv-badge-danger" style="margin-left:8px">HIGH RISK</span>
        <span class="muted" style="margin-left:8px">max ${esc(r.suggested_max_position_pct ?? "≤2")}% · conviction ${esc(r.conviction || "low")}</span></div>
      <div class="muted" style="margin-top:4px;font-size:12px">Price ${priceCell(r)} · 52-wk ${pctSigned(r.chg_52w)}</div>
      <div style="margin-top:6px"><b>Catalyst:</b> ${esc(cat)}</div>
      ${r.upside ? `<div><b>If it works:</b> ${esc(r.upside)}</div>` : ""}
      <div><b>If it doesn't:</b> ${esc(r.downside || "can lose the whole position")}</div>
      <div class="muted" style="margin-top:4px;font-size:11px">${esc(r.date)}</div>
    </div>`;
  }).join("") : '<div class="empty">No rows match the filter.</div>';
  view().innerHTML = `<div class="card"><h2>Speculative / high-risk — small bets only</h2>
    <div class="empty" style="padding:0 0 10px">Very cheap, beaten-down names with big upside <b>if</b> a specific catalyst plays out — and real risk of a total loss. Each has a sourced catalyst (no hope-bets). Lottery-ticket sizing, never core positions.</div>
    ${bar}${cards}<div class="legend">${LEGEND.speculative}</div></div>`;
  view().querySelector(".sflt").onchange = e => { st.f.conviction = e.target.value; rerender(); };
  view().querySelector(".ssort").onchange = e => { st.sort = { k: e.target.value, dir: e.target.value === "chg_52w" ? 1 : -1 }; rerender(); };
}

function dedupeByTicker(rows) { const seen = new Set(); return rows.filter(r => !seen.has(r.ticker) && seen.add(r.ticker)); }
function pct(x) { return x == null ? "—" : (x*100).toFixed(1) + "%"; }

sb.auth.onAuthStateChange((_e, session) => { session ? renderShell(session) : renderLogin(); });
boot();
</script>
</body>
</html>
